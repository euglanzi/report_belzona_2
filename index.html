<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Report Sopralluogo</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

h2 {
  margin-bottom: 10px;
}

#formCounter {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* TOGGLE */
.toggle-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.toggle-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background-color: white;
  cursor: pointer;
}

.toggle-btn.active.si {
  background-color: #274c77;
  color: white;
}

.toggle-btn.active.no {
  background-color: #c1121f;
  color: white;
}

/* INPUT */
input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 6px;
}

/* BUTTON */
button {
  padding: 10px 16px;
  cursor: pointer;
}

</style>
</head>

<body>

<h2>Report Sopralluogo</h2>

<div id="formCounter">N° ...</div>

<input placeholder="Cliente" name="cliente">
<input placeholder="Luogo" name="luogo">
<input placeholder="Oggetto" name="oggetto">

<label>Sicurezza AGGRESSIVI</label>
<div class="toggle-group">
  <button type="button" class="toggle-btn" onclick="selectToggle(this,'SI')">SI</button>
  <button type="button" class="toggle-btn" onclick="selectToggle(this,'NO')">NO</button>
  <input type="hidden" name="sic_aggressivi">
</div>

<label>Note</label>
<textarea name="note_sez1"></textarea>

<button onclick="sendForm()">Invia Report</button>

<script>

let formCount = 1;

/* =========================
   CONFIG
========================= */

function loadConfig() {
  const url = localStorage.getItem('bs_script_url');
  if (!url) {
    const newUrl = prompt("Inserisci URL Google Script");
    localStorage.setItem('bs_script_url', newUrl);
  }
}

/* =========================
   SYNC NUMERO DA EXCEL ✅
========================= */

async function loadCounterFromServer() {
  const scriptUrl = localStorage.getItem('bs_script_url');
  if (!scriptUrl) return;

  try {
    const res = await fetch(scriptUrl, { method: 'GET' });
    const j = await res.json();

    if (j.numero_report !== undefined) {
      formCount = Number(j.numero_report) + 1;
      localStorage.setItem('bs_form_count', formCount);
    }
  } catch (e) {
    console.log("Fallback local counter");
    formCount = Number(localStorage.getItem('bs_form_count')) || 1;
  }

  document.getElementById('formCounter').textContent = 'N° ' + formCount;
}

/* =========================
   TOGGLE SI / NO ✅
========================= */

function selectToggle(btn, value) {
  const group = btn.parentElement;
  const buttons = group.querySelectorAll('.toggle-btn');

  buttons.forEach(b => b.classList.remove('active', 'si', 'no'));

  btn.classList.add('active');
  btn.classList.add(value === 'SI' ? 'si' : 'no');

  const input = group.querySelector('input[type=hidden]');
  if (input) input.value = value;
}

/* =========================
   INVIO FORM ✅
========================= */

async function sendForm() {

  const scriptUrl = localStorage.getItem('bs_script_url');

  const inputs = document.querySelectorAll('input, textarea');
  let data = {};

  inputs.forEach(i => {
    if (i.name) data[i.name] = i.value;
  });

  try {

    const res = await fetch(scriptUrl, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    });

    let serverNumero = null;

    try {
      const j = await res.json();
      serverNumero = j.numero_report;
    } catch (e) {}

    if (serverNumero !== null) {
      formCount = serverNumero + 1;
      localStorage.setItem('bs_form_count', formCount);
      showToast("✅ Report N°" + serverNumero + " inviato!");
    } else {
      formCount++;
      localStorage.setItem('bs_form_count', formCount);
      showToast("⚠️ Inviato (numero stimato)");
    }

  } catch (err) {
    alert("Errore invio!");
  }

  document.getElementById('formCounter').textContent = 'N° ' + formCount;

  setTimeout(resetForm, 800);
}

/* =========================
   UTIL
========================= */

function resetForm() {
  document.querySelectorAll('input, textarea').forEach(i => i.value = '');

  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.classList.remove('active','si','no');
  });
}

function showToast(msg) {
  alert(msg); // semplice, possiamo migliorarlo dopo
}

/* =========================
   INIT ✅
========================= */

window.onload = function () {
  loadConfig();
  loadCounterFromServer();
};

</script>

</body>
</html>
``
